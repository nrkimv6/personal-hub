[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    http: TestClient 기반 — 실서버 불필요, Redis만 필요
    http_live: 실서버(localhost:8001) 직접 호출 — restart-api 후 폴링 대기 필수
    e2e: 실서버(localhost:8001) 또는 실브라우저(Playwright) 필요 — TestClient 기반은 integration 사용
    integration: TestClient/in-process 통합 테스트 — 실서버 불필요, 실제 의존성(파일시스템/DB) 일부 사용
    full_e2e: 전체 파이프라인 E2E — 수동 호출 전용 (pytest -m full_e2e)
    memory_spike_repro: test_merge_retry_e2e 메모리 급등 재현용 핵심 케이스
    allow_prod_redis: 테스트에서 production Redis(db=0) 직접 접속 허용 (E2E 테스트 전용)
asyncio_mode = auto
testpaths = tests

# Windows 인코딩 문제 해결: 캡처를 sys로 설정
# (fd 캡처 대신 sys 캡처 사용 - 인코딩 문제 방지)
addopts = --capture=sys -m "not http and not http_live and not integration and not e2e"
timeout = 120

# Coverage 기본 설정 (--cov 옵션 사용 시 활성화)
# 사용법: pytest --cov=app tests/
