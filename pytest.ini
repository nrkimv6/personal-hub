[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    http: TestClient 기반 — 실서버 불필요, Redis만 필요
    http_live: 실서버(localhost:8001) 직접 호출 — restart-api 후 폴링 대기 필수
    e2e: end-to-end tests requiring real Redis and listener
    integration: 실제 Redis/프로세스 필요 (CI에서 Redis 있으면 실행)
    full_e2e: 전체 파이프라인 E2E — 수동 호출 전용 (pytest -m full_e2e)
asyncio_mode = auto
testpaths = tests

# Windows 인코딩 문제 해결: 캡처를 sys로 설정
# (fd 캡처 대신 sys 캡처 사용 - 인코딩 문제 방지)
addopts = --capture=sys -m "not http and not http_live and not integration"
timeout = 120

# Coverage 기본 설정 (--cov 옵션 사용 시 활성화)
# 사용법: pytest --cov=app tests/
