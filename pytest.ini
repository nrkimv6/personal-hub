[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    http: requires real HTTP port, Redis, and listener process
asyncio_mode = auto
testpaths = tests

# Windows 인코딩 문제 해결: 캡처를 sys로 설정
# (fd 캡처 대신 sys 캡처 사용 - 인코딩 문제 방지)
addopts = --capture=sys

# Coverage 기본 설정 (--cov 옵션 사용 시 활성화)
# 사용법: pytest --cov=app tests/
