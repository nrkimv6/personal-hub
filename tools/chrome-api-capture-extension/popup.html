<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>API Capture</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="toolbar">
      <label class="toggle">
        <input id="captureToggle" type="checkbox">
        <span>Capture</span>
      </label>
      <span id="targetHost" class="host">new.land.naver.com</span>
    </header>

    <section class="notice">
      Headers and bodies may contain sensitive data. Exports are local only and should not be committed.
    </section>

    <section class="controls">
      <select id="sourceFilter" aria-label="Source filter">
        <option value="all">All sources</option>
        <option value="webRequest">webRequest</option>
        <option value="pageHook">pageHook</option>
      </select>
      <button id="clearTab" type="button">Clear tab</button>
      <button id="clearAll" type="button">Clear all</button>
      <button id="exportJson" type="button">Export JSON</button>
      <button id="exportNdjson" type="button">Export NDJSON</button>
    </section>

    <section id="replayGuard" class="replay-guard">
      Replay guard: GET/HEAD only. POST, PUT, PATCH, and DELETE return a blocked reason.
    </section>

    <main>
      <ol id="captureList" class="capture-list"></ol>
      <pre id="captureDetail" class="detail">Select a request.</pre>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
