[pytest]
# 테스트 경로
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 비동기 지원
asyncio_mode = auto

# 마커 정의
markers =
    slow: 느린 테스트 (GPU, 대용량 데이터)
    gpu: GPU 필요 테스트
    external: 외부 CLI 의존 테스트 (Claude CLI, Gemini CLI)

# 출력 옵션
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 최소 Python 버전
minversion = 7.0
